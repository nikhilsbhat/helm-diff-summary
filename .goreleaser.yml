# This is an example .goreleaser.yml file with some sane defaults.
# Make sure to check the documentation at http://goreleaser.com
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
        -X github.com/nikhilsbhat/helm-diff-summary/version.Version={{.Version}}
        -X github.com/nikhilsbhat/helm-diff-summary/version.Env={{.Env.BUILD_ENVIRONMENT}}
        -X github.com/nikhilsbhat/helm-diff-summary/version.BuildDate={{.Date}}
        -X github.com/nikhilsbhat/helm-diff-summary/version.Revision={{.Commit}}
        -X github.com/nikhilsbhat/helm-diff-summary/version.GoVersion={{.Env.GOVERSION}}
        -X github.com/nikhilsbhat/helm-diff-summary/version.Platform={{ .Os }}/{{ .Arch }}
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: windows
        goarch: arm
    binary: '{{ .ProjectName }}'

dockers_v2:
  - ids:
      - helm-diff-summary
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - "ghcr.io/nikhilsbhat/helm-diff-summary"
    tags:
      - "latest"
      - "{{ .Tag }}-{{ .Env.GOVERSION }}"
    labels:
      "org.opencontainers.image.source": "https://github.com/nikhilsbhat/helm-diff-summary"
      "org.opencontainers.image.description": "helm-diff-summary summarizes helm diff output into a concise Terraform-style deployment plan"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE

brews:
  - name: helm-diff-summary
    homepage: https://github.com/nikhilsbhat/helm-diff-summary
    url_template: "https://github.com/nikhilsbhat/helm-diff-summary/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: "helm-diff-summary summarizes helm diff output into a concise Terraform-style deployment plan"
    license: "MIT"
    directory: Formula
    commit_msg_template: "Add brew formula for {{ .ProjectName }} latest"
    download_strategy: CurlDownloadStrategy
    commit_author:
      name: nikhilsbhat
      email: nikhilsbhat93@gmail.com
    repository:
      owner: nikhilsbhat
      name: homebrew-stable
      branch: main
      pull_request:
        enabled: true
        base:
          owner: nikhilsbhat
          name: homebrew-stable
          branch: main
  - name: '{{ .ProjectName }}@{{ .Version }}'
    homepage: https://github.com/nikhilsbhat/helm-diff-summary
    url_template: "https://github.com/nikhilsbhat/helm-diff-summary/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: "helm-diff-summary summarizes helm diff output into a concise Terraform-style deployment plan"
    license: "MIT"
    directory: Formula
    commit_msg_template: "Add brew formula for {{ .ProjectName }} version {{ .Tag }}"
    download_strategy: CurlDownloadStrategy
    commit_author:
      name: nikhilsbhat
      email: nikhilsbhat93@gmail.com
    repository:
      owner: nikhilsbhat
      name: homebrew-stable
      branch: main
      pull_request:
        enabled: true
        base:
          owner: nikhilsbhat
          name: homebrew-stable
          branch: main

snapshot:
  version_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Runtime.Goos }}_{{ .Runtime.Goarch }}"

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}" # set this environment variable for your signing key
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

