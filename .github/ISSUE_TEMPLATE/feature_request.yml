name: Feature request
description: Suggest a new parser, renderer, policy, notification, or CI workflow improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Helm or GitOps review problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other tools you tried.
  - type: textarea
    id: examples
    attributes:
      label: Example input or output
      description: Add sample helm diff input, summary output, policy YAML, or CI snippets if helpful.
      render: text
