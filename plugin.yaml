name: diff-summary
version: 0.0.1
usage: Summarize helm diff output
ignoreFlags: false
description: Terraform-like summary for helm diff
command: "$HELM_PLUGIN_DIR/scripts/diff-summary.sh"
platformCommand:
  - os: linux
    arch: amd64
    command: "$HELM_PLUGIN_DIR/bin/helm-diff-summary"
  - os: darwin
    arch: amd64
    command: "$HELM_PLUGIN_DIR/bin/helm-diff-summary"